<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NXS — Owner Portal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap');
:root{
  --void:#03040a;--panel:#0b0e1f;--border:#1a1f3a;--border2:#252c50;
  --gold:#f0a500;--gold2:#ffc845;--cyan:#00e5ff;--red:#ff2d55;
  --green:#00ff88;--purple:#cc44ff;--text:#c8d0f0;--dim:#4a5270;--bright:#e8eeff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--void);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9000}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── LOCK SCREEN ────────────────────────────────────── */
#lock-screen{
  position:fixed;inset:0;z-index:500;
  display:flex;align-items:center;justify-content:center;
  background:var(--void);
}
.lock-grid{
  position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,229,255,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,0.018) 1px,transparent 1px);
  background-size:64px 64px;
  mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 0%,transparent 100%);
}
.lock-glow{
  position:absolute;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(240,165,0,0.04) 0%,transparent 65%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:gPulse 5s ease-in-out infinite;
}
@keyframes gPulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.15)}}
.lock-panel{
  position:relative;z-index:1;
  background:var(--panel);
  border:1px solid var(--border2);
  padding:52px 56px;
  width:420px;
  max-width:92vw;
  text-align:center;
  animation:riseUp 0.7s cubic-bezier(.2,.8,.2,1) forwards;
}
.lock-panel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.lock-panel::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--border2),transparent);
}
@keyframes riseUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
.lock-icon{font-size:44px;margin-bottom:18px;filter:drop-shadow(0 0 20px rgba(240,165,0,0.4))}
.lock-eyebrow{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:5px;color:var(--cyan);text-transform:uppercase;margin-bottom:8px}
.lock-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;letter-spacing:5px;color:var(--bright);margin-bottom:6px}
.lock-sub{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--dim);margin-bottom:36px;text-transform:uppercase}
.lock-input-wrap{position:relative;margin-bottom:10px}
.lock-input{
  width:100%;background:rgba(0,0,0,0.4);border:1px solid var(--border2);
  color:var(--bright);font-family:'Share Tech Mono',monospace;font-size:18px;
  letter-spacing:8px;text-align:center;padding:16px 48px 16px 20px;
  outline:none;transition:border-color 0.2s;
}
.lock-input::placeholder{letter-spacing:3px;font-size:12px;color:var(--dim)}
.lock-input:focus{border-color:var(--gold)}
.lock-eye{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--dim);font-size:16px;
  transition:color 0.2s;padding:4px;
}
.lock-eye:hover{color:var(--gold)}
.lock-submit{
  width:100%;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;
  letter-spacing:4px;padding:15px;background:var(--gold);color:#000;
  border:none;cursor:pointer;
  clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  transition:all 0.2s;margin-top:6px;
}
.lock-submit:hover{background:var(--gold2);transform:translateY(-2px);box-shadow:0 10px 32px rgba(240,165,0,0.3)}
.lock-error{
  font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;
  color:var(--red);margin-top:14px;opacity:0;transition:opacity 0.3s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.lock-error.show{opacity:1;animation:shake 0.4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.lock-attempts{
  font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;
  color:var(--dim);margin-top:20px;text-transform:uppercase;
}
.lock-dots{display:flex;gap:6px;justify-content:center;margin-top:10px}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--border2);transition:all 0.2s}
.ldot.filled{background:var(--gold);box-shadow:0 0 8px var(--gold)}
.ldot.wrong{background:var(--red);box-shadow:0 0 8px var(--red)}

/* ── ADMIN DASHBOARD ─────────────────────────────── */
#admin{display:none;position:relative;z-index:10;min-height:100vh;padding:0 0 80px}
.admin-nav{
  position:sticky;top:0;z-index:100;
  height:60px;display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;background:rgba(3,4,10,0.95);
  border-bottom:1px solid var(--border);backdrop-filter:blur(16px);
}
.admin-nav-logo{font-family:'Orbitron',monospace;font-size:15px;font-weight:900;letter-spacing:4px;color:var(--gold)}
.admin-nav-logo em{color:var(--cyan);font-style:normal}
.admin-nav-right{display:flex;align-items:center;gap:16px}
.admin-badge{
  font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;
  color:var(--gold);border:1px solid rgba(240,165,0,0.3);
  padding:5px 12px;background:rgba(240,165,0,0.05);text-transform:uppercase;
}
.admin-signout{
  font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;
  color:var(--dim);background:none;border:1px solid var(--border);
  padding:5px 12px;cursor:pointer;text-transform:uppercase;transition:all 0.2s;
}
.admin-signout:hover{border-color:var(--red);color:var(--red)}

.admin-hero{
  padding:60px 48px 40px;max-width:1200px;margin:0 auto;
}
.admin-eyebrow{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:6px;color:var(--cyan);text-transform:uppercase;margin-bottom:10px}
.admin-title{font-family:'Orbitron',monospace;font-size:clamp(28px,4vw,48px);font-weight:900;letter-spacing:4px;color:var(--bright);margin-bottom:6px}
.admin-title .gold{color:var(--gold)}
.admin-rule{width:64px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:16px 0 32px}

/* Stats strip */
.stats-strip{
  display:flex;gap:16px;flex-wrap:wrap;margin-bottom:48px;
}
.stat-tile{
  flex:1;min-width:140px;background:var(--panel);border:1px solid var(--border);
  padding:20px 24px;position:relative;overflow:hidden;
}
.stat-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--st-color)}
.stat-tile[data-color="gold"]{--st-color:var(--gold)}
.stat-tile[data-color="cyan"]{--st-color:var(--cyan)}
.stat-tile[data-color="purple"]{--st-color:var(--purple)}
.stat-tile[data-color="red"]{--st-color:var(--red)}
.stat-tile[data-color="green"]{--st-color:var(--green)}
.st-num{font-family:'Orbitron',monospace;font-size:30px;font-weight:900;color:var(--st-color);line-height:1}
.st-label{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--dim);margin-top:6px;text-transform:uppercase}

/* Toolbar */
.admin-toolbar{
  display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap;
}
.atool-btn{
  font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;
  padding:8px 16px;background:transparent;border:1px solid var(--border2);
  color:var(--dim);cursor:pointer;text-transform:uppercase;transition:all 0.2s;
  clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);
}
.atool-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.atool-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(240,165,0,0.06)}
.atool-btn.danger:hover{border-color:var(--red);color:var(--red)}
.atool-search{
  flex:1;min-width:200px;background:rgba(0,0,0,0.35);border:1px solid var(--border2);
  color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;
  letter-spacing:2px;padding:8px 16px;outline:none;transition:border-color 0.2s;
}
.atool-search::placeholder{color:var(--dim)}
.atool-search:focus{border-color:var(--cyan)}

/* Suggestion cards */
.suggestions-grid{display:flex;flex-direction:column;gap:12px}
.sug-card{
  background:var(--panel);border:1px solid var(--border);
  padding:22px 26px;display:flex;gap:20px;align-items:flex-start;
  transition:border-color 0.2s;position:relative;overflow:hidden;
  animation:cardIn 0.4s ease forwards;opacity:0;
}
@keyframes cardIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.sug-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--sc-color)}
.sug-card[data-type-color="game"]{--sc-color:#cc44ff}
.sug-card[data-type-color="bug"]{--sc-color:#ff2d55}
.sug-card[data-type-color="feature"]{--sc-color:#00e5ff}
.sug-card[data-type-color="general"]{--sc-color:#f0a500}
.sug-card:hover{border-color:var(--border2)}
.sug-index{
  font-family:'Orbitron',monospace;font-size:11px;font-weight:700;
  color:var(--dim);min-width:32px;padding-top:2px;
}
.sug-meta{flex:1}
.sug-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.sug-type-badge{
  font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;
  text-transform:uppercase;padding:3px 9px;border:1px solid var(--sc-color);
  color:var(--sc-color);background:rgba(0,0,0,0.3);
}
.sug-time{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--dim)}
.sug-text{font-size:14px;line-height:1.75;color:var(--text)}
.sug-actions{display:flex;gap:8px;margin-top:14px}
.sug-act{
  font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;
  padding:5px 12px;background:transparent;border:1px solid var(--border2);
  color:var(--dim);cursor:pointer;text-transform:uppercase;transition:all 0.2s;
}
.sug-act:hover{border-color:var(--green);color:var(--green)}
.sug-act.del:hover{border-color:var(--red);color:var(--red)}
.sug-act.done{border-color:var(--green);color:var(--green);background:rgba(0,255,136,0.06)}
.sug-delete-btn{
  background:none;border:none;color:var(--dim);cursor:pointer;
  font-size:16px;padding:4px;transition:color 0.2s;align-self:flex-start;
  margin-top:2px;
}
.sug-delete-btn:hover{color:var(--red)}

/* Empty state */
.empty-state{
  text-align:center;padding:80px 24px;
  font-family:'Share Tech Mono',monospace;
}
.empty-icon{font-size:52px;margin-bottom:20px;opacity:0.3}
.empty-title{font-family:'Orbitron',monospace;font-size:16px;letter-spacing:4px;color:var(--dim);margin-bottom:8px}
.empty-sub{font-size:11px;letter-spacing:2px;color:var(--border2);text-transform:uppercase}

/* Export modal */
#export-modal{
  position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;
  background:rgba(3,4,10,0.85);backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity 0.25s;
}
#export-modal.open{opacity:1;pointer-events:all}
.export-panel{
  background:var(--panel);border:1px solid var(--border2);
  padding:36px 40px;width:560px;max-width:94vw;max-height:80vh;
  display:flex;flex-direction:column;position:relative;
}
.export-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
.export-title{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;letter-spacing:4px;color:var(--bright);margin-bottom:16px}
.export-area{
  flex:1;background:rgba(0,0,0,0.4);border:1px solid var(--border);
  color:var(--green);font-family:'Share Tech Mono',monospace;font-size:11px;
  line-height:1.7;padding:16px;overflow-y:auto;max-height:360px;resize:none;
  outline:none;
}
.export-btns{display:flex;gap:10px;margin-top:16px}
.exp-btn{
  font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;
  padding:10px 20px;background:transparent;border:1px solid var(--border2);
  color:var(--dim);cursor:pointer;text-transform:uppercase;transition:all 0.2s;
  clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);
}
.exp-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.exp-btn.prime{border-color:var(--gold);color:var(--gold)}
.exp-btn.prime:hover{background:rgba(240,165,0,0.1)}

/* Change password modal */
#pw-modal{
  position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;
  background:rgba(3,4,10,0.85);backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity 0.25s;
}
#pw-modal.open{opacity:1;pointer-events:all}
.pw-panel{
  background:var(--panel);border:1px solid var(--border2);
  padding:40px 44px;width:420px;max-width:92vw;text-align:center;position:relative;
}
.pw-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--purple),transparent)}
.pw-title{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;letter-spacing:4px;color:var(--bright);margin-bottom:24px}
.pw-input{
  width:100%;background:rgba(0,0,0,0.4);border:1px solid var(--border2);
  color:var(--bright);font-family:'Share Tech Mono',monospace;font-size:16px;
  letter-spacing:6px;text-align:center;padding:14px;outline:none;
  transition:border-color 0.2s;margin-bottom:10px;
}
.pw-input:focus{border-color:var(--purple)}
.pw-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--dim);text-align:left;margin-bottom:6px;display:block;text-transform:uppercase}
.pw-save{
  width:100%;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;
  letter-spacing:3px;padding:14px;background:var(--purple);color:#fff;
  border:none;cursor:pointer;margin-top:8px;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  transition:all 0.2s;
}
.pw-save:hover{background:#d94fff;transform:translateY(-2px)}
.pw-cancel{
  background:none;border:none;font-family:'Share Tech Mono',monospace;
  font-size:9px;letter-spacing:2px;color:var(--dim);cursor:pointer;
  margin-top:14px;text-transform:uppercase;transition:color 0.2s;
}
.pw-cancel:hover{color:var(--red)}
.pw-msg{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;margin-top:10px;min-height:16px}

/* Confirm delete modal */
#confirm-modal{
  position:fixed;inset:0;z-index:700;display:flex;align-items:center;justify-content:center;
  background:rgba(3,4,10,0.88);backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity 0.25s;
}
#confirm-modal.open{opacity:1;pointer-events:all}
.confirm-panel{
  background:var(--panel);border:1px solid rgba(255,45,85,0.3);
  padding:36px 40px;width:380px;max-width:92vw;text-align:center;position:relative;
}
.confirm-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--red)}
.confirm-icon{font-size:36px;margin-bottom:12px}
.confirm-title{font-family:'Orbitron',monospace;font-size:14px;letter-spacing:4px;color:var(--bright);margin-bottom:8px}
.confirm-sub{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--dim);margin-bottom:24px;text-transform:uppercase}
.confirm-btns{display:flex;gap:10px}
.confirm-yes{flex:1;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:3px;padding:12px;background:var(--red);color:#fff;border:none;cursor:pointer;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);transition:all 0.2s}
.confirm-yes:hover{background:#ff5577}
.confirm-no{flex:1;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;padding:12px;background:transparent;color:var(--dim);border:1px solid var(--border2);cursor:pointer;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);transition:all 0.2s}
.confirm-no:hover{border-color:var(--cyan);color:var(--cyan)}

/* Notification toast */
#admin-toast{
  position:fixed;bottom:28px;right:28px;z-index:9000;
  font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;
  padding:13px 22px;background:var(--panel);border:1px solid rgba(0,255,136,0.3);
  color:var(--green);clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  transform:translateY(80px);opacity:0;transition:all 0.35s cubic-bezier(.2,.8,.2,1);
}
#admin-toast.show{transform:translateY(0);opacity:1}
#admin-toast.warn{border-color:rgba(255,165,0,0.4);color:var(--gold)}
#admin-toast.err{border-color:rgba(255,45,85,0.4);color:var(--red)}

@media(max-width:768px){.admin-hero{padding:40px 20px 28px}.stats-strip{gap:10px}.admin-nav{padding:0 16px}}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- ══════════════════════════════════════════════════
     LOCK SCREEN
════════════════════════════════════════════════════ -->
<div id="lock-screen">
  <div class="lock-grid"></div>
  <div class="lock-glow"></div>
  <div class="lock-panel">
    <div class="lock-icon">🔐</div>
    <div class="lock-eyebrow">NXS Arcade</div>
    <div class="lock-title">OWNER PORTAL</div>
    <div class="lock-sub">Restricted Access · Enter Passcode</div>
    <div class="lock-input-wrap">
      <input class="lock-input" type="password" id="lock-input" maxlength="20"
        placeholder="Enter passcode" autocomplete="off"
        onkeydown="if(event.key==='Enter')tryUnlock()" oninput="onPinInput()">
      <button class="lock-eye" id="lock-eye-btn" onclick="toggleEye()" tabindex="-1">👁</button>
    </div>
    <button class="lock-submit" onclick="tryUnlock()">▶ AUTHENTICATE</button>
    <div class="lock-error" id="lock-error">⚠ Incorrect passcode</div>
    <div class="lock-attempts" id="lock-attempts-label"></div>
    <div class="lock-dots" id="lock-dots"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════
     ADMIN DASHBOARD
════════════════════════════════════════════════════ -->
<div id="admin">

  <nav class="admin-nav">
    <div class="admin-nav-logo"><em>NXS</em> ARCADE</div>
    <div class="admin-nav-right">
      <div class="admin-badge">⬡ OWNER</div>
      <button class="admin-signout" onclick="signOut()">Sign Out</button>
    </div>
  </nav>

  <div class="admin-hero">
    <div class="admin-eyebrow">Owner Dashboard</div>
    <h1 class="admin-title">SUGGESTION <span class="gold">INBOX</span></h1>
    <div class="admin-rule"></div>

    <!-- Stats -->
    <div class="stats-strip" id="stats-strip">
      <div class="stat-tile" data-color="gold"><div class="st-num" id="st-total">0</div><div class="st-label">Total</div></div>
      <div class="stat-tile" data-color="purple"><div class="st-num" id="st-game">0</div><div class="st-label">New Games</div></div>
      <div class="stat-tile" data-color="red"><div class="st-num" id="st-bug">0</div><div class="st-label">Bug Reports</div></div>
      <div class="stat-tile" data-color="cyan"><div class="st-num" id="st-feat">0</div><div class="st-label">Features</div></div>
      <div class="stat-tile" data-color="green"><div class="st-num" id="st-done">0</div><div class="st-label">Reviewed</div></div>
    </div>

    <!-- Toolbar -->
    <div class="admin-toolbar">
      <input class="atool-search" type="text" placeholder="Search suggestions…" id="search-input" oninput="renderSuggestions()">
      <button class="atool-btn active" id="filter-all" onclick="setFilter('all',this)">All</button>
      <button class="atool-btn" id="filter-game" onclick="setFilter('game',this)">🎮 Games</button>
      <button class="atool-btn" id="filter-bug" onclick="setFilter('bug',this)">🐛 Bugs</button>
      <button class="atool-btn" id="filter-feature" onclick="setFilter('feature',this)">✨ Features</button>
      <button class="atool-btn" id="filter-general" onclick="setFilter('general',this)">💬 General</button>
      <button class="atool-btn" onclick="openExport()">📋 Export</button>
      <button class="atool-btn" onclick="openChangePw()">🔑 Change Code</button>
      <button class="atool-btn danger" onclick="promptClearAll()">🗑 Clear All</button>
      <a class="atool-btn" href="index.html">← Back to Arcade</a>
    </div>

    <!-- Cards -->
    <div class="suggestions-grid" id="suggestions-grid"></div>
  </div>

</div>

<!-- Export Modal -->
<div id="export-modal">
  <div class="export-panel">
    <div class="export-title">📋 EXPORT SUGGESTIONS</div>
    <textarea class="export-area" id="export-area" readonly></textarea>
    <div class="export-btns">
      <button class="exp-btn prime" onclick="copyExport()">Copy All</button>
      <button class="exp-btn" onclick="downloadExport()">Download .txt</button>
      <button class="exp-btn" onclick="closeExport()">Close</button>
    </div>
  </div>
</div>

<!-- Change Password Modal -->
<div id="pw-modal">
  <div class="pw-panel">
    <div class="pw-title">🔑 CHANGE PASSCODE</div>
    <label class="pw-label">Current passcode</label>
    <input class="pw-input" type="password" id="pw-current" placeholder="••••••" autocomplete="off">
    <label class="pw-label">New passcode</label>
    <input class="pw-input" type="password" id="pw-new" placeholder="••••••" autocomplete="off">
    <label class="pw-label">Confirm new passcode</label>
    <input class="pw-input" type="password" id="pw-confirm" placeholder="••••••" autocomplete="off">
    <button class="pw-save" onclick="saveNewPw()">▶ UPDATE PASSCODE</button>
    <div class="pw-msg" id="pw-msg"></div>
    <button class="pw-cancel" onclick="closePwModal()">Cancel</button>
  </div>
</div>

<!-- Confirm Clear All Modal -->
<div id="confirm-modal">
  <div class="confirm-panel">
    <div class="confirm-icon">⚠️</div>
    <div class="confirm-title">CLEAR ALL?</div>
    <div class="confirm-sub" id="confirm-sub">This cannot be undone</div>
    <div class="confirm-btns">
      <button class="confirm-yes" id="confirm-yes-btn">Delete</button>
      <button class="confirm-no" onclick="closeConfirm()">Cancel</button>
    </div>
  </div>
</div>

<!-- Admin Toast -->
<div id="admin-toast"></div>

<script>
// ── STAR BACKGROUND ───────────────────────────────────────────────────────
const sc=document.getElementById('stars'),cx=sc.getContext('2d');let stars=[];
function rsz(){sc.width=innerWidth;sc.height=innerHeight;}
function ist(){stars=[];for(let i=0;i<180;i++)stars.push({x:Math.random()*sc.width,y:Math.random()*sc.height,r:Math.random()*1.2+0.2,o:Math.random()*0.4+0.06,sp:Math.random()*0.1+0.02,tw:Math.random()*Math.PI*2});}
function dst(){cx.clearRect(0,0,sc.width,sc.height);const t=Date.now()/1000;stars.forEach(s=>{const o=s.o*(0.5+0.5*Math.sin(t*s.sp*3+s.tw));cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(190,205,255,${o})`;cx.fill();});requestAnimationFrame(dst);}
rsz();ist();dst();window.addEventListener('resize',()=>{rsz();ist();});

// ── AUTH ──────────────────────────────────────────────────────────────────
const DEFAULT_PW   = 'NXS2025';   // ← DEFAULT OWNER PASSCODE (change in portal)
const PW_KEY       = 'nxs_admin_pw';
const SESSION_KEY  = 'nxs_admin_session';
const MAX_ATTEMPTS = 5;
let attempts = 0;
let lockoutUntil = 0;

function getStoredPw() {
  return localStorage.getItem(PW_KEY) || DEFAULT_PW;
}

function tryUnlock() {
  const now = Date.now();
  if (now < lockoutUntil) {
    const secs = Math.ceil((lockoutUntil - now) / 1000);
    showLockError(`Locked out — wait ${secs}s`);
    return;
  }
  const input = document.getElementById('lock-input').value;
  if (input === getStoredPw()) {
    // Correct — grant session (expires in 2 hours)
    sessionStorage.setItem(SESSION_KEY, String(Date.now() + 7200000));
    attempts = 0;
    unlockAdmin();
  } else {
    attempts++;
    updateDots(false);
    if (attempts >= MAX_ATTEMPTS) {
      lockoutUntil = Date.now() + 30000;
      attempts = 0;
      showLockError('Too many attempts — locked 30s');
      document.getElementById('lock-input').value = '';
      setTimeout(() => { lockoutUntil = 0; showLockError(''); updateDots(null); }, 30000);
    } else {
      showLockError(`Incorrect · ${MAX_ATTEMPTS - attempts} attempts left`);
      document.getElementById('lock-input').value = '';
    }
  }
}

function showLockError(msg) {
  const el = document.getElementById('lock-error');
  el.textContent = msg ? '⚠ ' + msg : '';
  el.classList.toggle('show', !!msg);
}

function updateDots(lastWrong) {
  const dots = document.getElementById('lock-dots');
  dots.innerHTML = '';
  for (let i = 0; i < MAX_ATTEMPTS; i++) {
    const d = document.createElement('div');
    d.className = 'ldot';
    if (i < attempts) d.classList.add(lastWrong === false ? 'wrong' : 'filled');
    dots.appendChild(d);
  }
}

function onPinInput() {
  showLockError('');
}

function toggleEye() {
  const inp = document.getElementById('lock-input');
  const btn = document.getElementById('lock-eye-btn');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

function unlockAdmin() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('admin').style.display = 'block';
  renderDashboard();
}

function signOut() {
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();
}

// Auto-restore session if still valid
(function checkSession() {
  const exp = Number(sessionStorage.getItem(SESSION_KEY) || 0);
  if (Date.now() < exp) unlockAdmin();
})();

// ── DATA ──────────────────────────────────────────────────────────────────
const STORE_KEY = 'nxs_suggestions';

function getSuggestions() {
  return JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
}

function saveSuggestions(arr) {
  localStorage.setItem(STORE_KEY, JSON.stringify(arr));
}

function typeColor(type) {
  if (type.includes('New Game')) return 'game';
  if (type.includes('Bug'))      return 'bug';
  if (type.includes('Feature'))  return 'feature';
  return 'general';
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
    + ' · ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

// ── RENDER ────────────────────────────────────────────────────────────────
let activeFilter = 'all';

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.atool-btn[id^="filter"]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSuggestions();
}

function renderDashboard() {
  updateStats();
  renderSuggestions();
}

function updateStats() {
  const all = getSuggestions();
  document.getElementById('st-total').textContent = all.length;
  document.getElementById('st-game').textContent  = all.filter(s => s.type.includes('New Game')).length;
  document.getElementById('st-bug').textContent   = all.filter(s => s.type.includes('Bug')).length;
  document.getElementById('st-feat').textContent  = all.filter(s => s.type.includes('Feature')).length;
  document.getElementById('st-done').textContent  = all.filter(s => s.reviewed).length;
}

function renderSuggestions() {
  const grid = document.getElementById('suggestions-grid');
  const query = document.getElementById('search-input').value.toLowerCase().trim();
  let data = getSuggestions();

  // Filter
  if (activeFilter !== 'all') {
    data = data.filter(s => typeColor(s.type) === activeFilter);
  }
  if (query) {
    data = data.filter(s => s.text.toLowerCase().includes(query) || s.type.toLowerCase().includes(query));
  }

  // Sort newest first
  data = [...data].reverse();

  if (data.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-title">NO SUGGESTIONS</div>
      <div class="empty-sub">${query ? 'No results match your search' : 'Nothing here yet'}</div>
    </div>`;
    return;
  }

  // Find original indices for delete/review operations
  const allData = getSuggestions();
  grid.innerHTML = '';
  data.forEach((s, i) => {
    const origIdx = allData.indexOf(s); // won't always work after reverse; use id instead
    const card = document.createElement('div');
    card.className = 'sug-card';
    card.dataset.typeColor = typeColor(s.type);
    card.style.animationDelay = (i * 0.04) + 's';
    const origIndex = allData.findIndex(x => x.ts === s.ts && x.text === s.text);
    card.innerHTML = `
      <div class="sug-index">#${String(origIndex + 1).padStart(2,'0')}</div>
      <div class="sug-meta">
        <div class="sug-header">
          <span class="sug-type-badge">${s.type}</span>
          <span class="sug-time">🕐 ${formatTime(s.ts)}</span>
          ${s.reviewed ? '<span class="sug-type-badge" style="--sc-color:var(--green);color:var(--green);border-color:var(--green)">✓ Reviewed</span>' : ''}
        </div>
        <div class="sug-text">${escapeHtml(s.text)}</div>
        <div class="sug-actions">
          <button class="sug-act ${s.reviewed?'done':''}" onclick="toggleReviewed(${origIndex})">
            ${s.reviewed ? '✓ Reviewed' : 'Mark Reviewed'}
          </button>
          <button class="sug-act del" onclick="promptDelete(${origIndex})">Delete</button>
        </div>
      </div>
      <button class="sug-delete-btn" onclick="promptDelete(${origIndex})" title="Delete">✕</button>
    `;
    grid.appendChild(card);
  });
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
function toggleReviewed(idx) {
  const data = getSuggestions();
  if (!data[idx]) return;
  data[idx].reviewed = !data[idx].reviewed;
  saveSuggestions(data);
  renderDashboard();
  showToast(data[idx].reviewed ? '✓ Marked as reviewed' : 'Unmarked', data[idx].reviewed ? '' : 'warn');
}

let pendingDeleteIdx = null;
let pendingClearAll = false;

function promptDelete(idx) {
  pendingDeleteIdx = idx;
  pendingClearAll = false;
  document.getElementById('confirm-sub').textContent = 'This suggestion will be permanently deleted';
  document.getElementById('confirm-yes-btn').textContent = 'Delete';
  document.getElementById('confirm-modal').classList.add('open');
}

function promptClearAll() {
  pendingClearAll = true;
  pendingDeleteIdx = null;
  document.getElementById('confirm-sub').textContent = 'All ' + getSuggestions().length + ' suggestions will be deleted forever';
  document.getElementById('confirm-yes-btn').textContent = 'Clear All';
  document.getElementById('confirm-modal').classList.add('open');
}

function closeConfirm() {
  document.getElementById('confirm-modal').classList.remove('open');
}

document.getElementById('confirm-yes-btn').addEventListener('click', () => {
  closeConfirm();
  if (pendingClearAll) {
    saveSuggestions([]);
    renderDashboard();
    showToast('🗑 All suggestions cleared', 'warn');
  } else if (pendingDeleteIdx !== null) {
    const data = getSuggestions();
    data.splice(pendingDeleteIdx, 1);
    saveSuggestions(data);
    renderDashboard();
    showToast('Suggestion deleted', 'warn');
  }
});

// ── EXPORT ────────────────────────────────────────────────────────────────
function openExport() {
  const data = getSuggestions();
  const lines = data.map((s, i) =>
    `[${String(i+1).padStart(3,'0')}] ${s.type}\n  Date: ${formatTime(s.ts)}\n  Text: ${s.text}\n  Status: ${s.reviewed ? 'Reviewed' : 'Pending'}\n`
  ).join('\n');
  document.getElementById('export-area').value = lines || '(no suggestions yet)';
  document.getElementById('export-modal').classList.add('open');
}

function closeExport() {
  document.getElementById('export-modal').classList.remove('open');
}

function copyExport() {
  navigator.clipboard.writeText(document.getElementById('export-area').value)
    .then(() => showToast('Copied to clipboard'))
    .catch(() => { document.getElementById('export-area').select(); document.execCommand('copy'); showToast('Copied'); });
}

function downloadExport() {
  const text = document.getElementById('export-area').value;
  const blob = new Blob([text], {type:'text/plain'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'nxs_suggestions.txt';
  a.click(); URL.revokeObjectURL(url);
  showToast('⬇ Download started');
}

// ── CHANGE PASSWORD ───────────────────────────────────────────────────────
function openChangePw() {
  document.getElementById('pw-current').value = '';
  document.getElementById('pw-new').value = '';
  document.getElementById('pw-confirm').value = '';
  document.getElementById('pw-msg').textContent = '';
  document.getElementById('pw-modal').classList.add('open');
}

function closePwModal() {
  document.getElementById('pw-modal').classList.remove('open');
}

function saveNewPw() {
  const cur  = document.getElementById('pw-current').value;
  const nw   = document.getElementById('pw-new').value.trim();
  const conf = document.getElementById('pw-confirm').value.trim();
  const msg  = document.getElementById('pw-msg');

  if (cur !== getStoredPw()) {
    msg.style.color = 'var(--red)'; msg.textContent = '⚠ Current passcode is wrong'; return;
  }
  if (nw.length < 4) {
    msg.style.color = 'var(--red)'; msg.textContent = '⚠ Passcode must be at least 4 characters'; return;
  }
  if (nw !== conf) {
    msg.style.color = 'var(--red)'; msg.textContent = '⚠ New passcodes do not match'; return;
  }
  localStorage.setItem(PW_KEY, nw);
  msg.style.color = 'var(--green)';
  msg.textContent = '✓ Passcode updated!';
  setTimeout(closePwModal, 1500);
  showToast('🔑 Passcode changed successfully');
}

// ── TOAST ─────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('admin-toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 3000);
}

// Click outside modals to close
document.getElementById('export-modal').addEventListener('click', e => { if(e.target === e.currentTarget) closeExport(); });
document.getElementById('pw-modal').addEventListener('click', e => { if(e.target === e.currentTarget) closePwModal(); });
document.getElementById('confirm-modal').addEventListener('click', e => { if(e.target === e.currentTarget) closeConfirm(); });
</script>
</body>
</html>
