@import url('https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#020308;cursor:crosshair;}
body::before{content:'';position:fixed;inset:0;z-index:9000;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.7;mix-blend-mode:overlay;}
body::after{content:'';position:fixed;inset:0;z-index:8999;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,transparent 30%,rgba(0,0,0,0.95) 100%);}
#menu{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;overflow-y:auto;padding:24px 20px 40px;}
.menu-bg{position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse at 50% 30%,#0a0810 0%,#020308 70%);}
.factory-bg{position:fixed;bottom:0;left:0;right:0;height:35%;z-index:-1;pointer-events:none;}
.factory-sky{position:absolute;bottom:0;left:0;right:0;height:100%;
  background:linear-gradient(180deg,transparent 0%,#04060a 40%,#020308 100%);}
.f-bld{position:absolute;bottom:0;background:#02020a;border-top:2px solid #0a0810;}
.f-win{position:absolute;width:8px;height:10px;border:1px solid #0e1220;background:#020308;animation:winFl 4s infinite;}
@keyframes winFl{0%,100%{background:#020308}18%{background:#0e0a06;box-shadow:0 0 4px rgba(200,130,20,0.3)}
  19%{background:#020308}60%{background:#060c10}61%{background:#020308}}
.d-eyes{position:fixed;bottom:14%;left:50%;transform:translateX(-50%);display:flex;gap:32px;z-index:1;pointer-events:none;}
.d-eye{width:10px;height:10px;border-radius:50%;animation:dEP 5s ease-in-out infinite;}
@keyframes dEP{0%,65%,100%{opacity:0}35%{opacity:0.55}}
.menu-logo{font-family:'Creepster',cursive;font-size:clamp(28px,5.5vw,70px);color:#f5c518;
  text-shadow:0 0 30px rgba(245,197,24,0.4),4px 4px 0 #5a3800;letter-spacing:4px;text-align:center;
  animation:lgP 5s ease-in-out infinite;position:relative;z-index:5;}
@keyframes lgP{0%,100%{text-shadow:0 0 30px rgba(245,197,24,0.35),4px 4px 0 #5a3800}
  50%{text-shadow:0 0 60px rgba(245,197,24,0.6),4px 4px 0 #5a3800}}
.menu-tag{font-family:'Special Elite',cursive;font-size:clamp(7px,1.1vw,11px);color:#2a1a08;
  letter-spacing:5px;text-align:center;position:relative;z-index:5;margin-bottom:2px;}
.menu-co{font-family:'Creepster',cursive;font-size:clamp(6px,0.9vw,9px);color:#120808;
  letter-spacing:4px;text-align:center;position:relative;z-index:5;}
.menu-div{width:min(400px,80vw);height:1px;
  background:linear-gradient(90deg,transparent,rgba(204,34,34,0.4),transparent);margin:16px 0;}
.sel-lbl{font-family:'Special Elite',cursive;font-size:9px;color:#2a1010;letter-spacing:5px;margin-bottom:14px;}
.ch-grid{display:flex;flex-direction:column;gap:9px;width:min(680px,92vw);}
.ch-card{position:relative;background:rgba(4,4,10,0.92);border-radius:3px;cursor:pointer;
  transition:transform 0.15s;overflow:hidden;display:flex;align-items:center;}
.ch-card:hover{transform:translateX(5px);}
.ch-num-blk{min-width:68px;width:68px;height:88px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;flex-shrink:0;}
.ch-n-big{font-family:'Creepster',cursive;font-size:26px;letter-spacing:2px;line-height:1;}
.ch-n-word{font-family:'Special Elite',cursive;font-size:7px;letter-spacing:2px;}
.ch-vdiv{width:1px;height:58px;background:rgba(255,255,255,0.05);flex-shrink:0;}
.ch-info{flex:1;padding:12px 16px;display:flex;flex-direction:column;gap:3px;}
.ch-sub{font-family:'Creepster',cursive;font-size:clamp(15px,2.4vw,21px);letter-spacing:3px;}
.ch-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.ch-vill{font-family:'Special Elite',cursive;font-size:9px;letter-spacing:2px;color:#3a2a2a;}
.ch-sep{width:3px;height:3px;border-radius:50%;background:#2a1818;}
.ch-rm{font-family:'Special Elite',cursive;font-size:9px;letter-spacing:2px;color:#2a2020;}
.ch-yr{font-family:'Special Elite',cursive;font-size:9px;letter-spacing:2px;color:#1a1818;}
.ch-prog{display:flex;gap:3px;margin-top:4px;}
.cp-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);}
.ch-arr{width:36px;display:flex;align-items:center;justify-content:center;font-size:14px;
  opacity:0;transition:opacity 0.15s;flex-shrink:0;padding-right:6px;}
.ch-card:hover .ch-arr{opacity:1;}
.menu-foot{margin-top:18px;font-family:'Special Elite',cursive;font-size:8px;color:#120808;
  letter-spacing:3px;text-align:center;}
.menu-warn{font-size:9px;color:#1a0808;letter-spacing:3px;animation:wP 3s infinite;
  margin-top:6px;text-align:center;font-family:'Special Elite',cursive;}
@keyframes wP{0%,100%{opacity:0.2}50%{opacity:0.8}}
#load-overlay{position:fixed;inset:0;z-index:9999;background:#020308;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.lt{font-family:'Creepster',cursive;font-size:clamp(18px,3vw,30px);letter-spacing:4px;}
.lb{width:200px;height:3px;background:#0a0808;border:1px solid #1a0808;border-radius:2px;overflow:hidden;}
.lf{height:100%;border-radius:2px;width:0%;transition:width 1s ease-out;}
.ls{font-family:'Special Elite',cursive;font-size:10px;color:#2a0808;letter-spacing:3px;}
.le-wrap{display:flex;gap:22px;margin-top:6px;}
.le{width:8px;height:8px;border-radius:50%;animation:leP 1s ease-in-out infinite;}
@keyframes leP{0%,100%{opacity:0.2}50%{opacity:1}}
@media(max-width:420px){.ch-num-blk{min-width:52px;width:52px;}.ch-n-big{font-size:20px;}.ch-info{padding:10px;}}
</style>
</head>
<body>
<div id="menu">
  <div class="menu-bg"></div>
  <div class="factory-bg">
    <div class="factory-sky"></div>
    <div class="f-bld" style="left:0;width:8%;height:45%;"></div>
    <div class="f-bld" style="left:8%;width:5%;height:60%;"></div>
    <div class="f-bld" style="left:13%;width:12%;height:38%;"></div>
    <div class="f-bld" style="left:25%;width:6%;height:55%;"></div>
    <div class="f-bld" style="left:31%;width:18%;height:42%;"></div>
    <div class="f-bld" style="left:49%;width:8%;height:62%;"></div>
    <div class="f-bld" style="left:57%;width:14%;height:36%;"></div>
    <div class="f-bld" style="left:71%;width:9%;height:50%;"></div>
    <div class="f-bld" style="left:80%;width:7%;height:45%;"></div>
    <div class="f-bld" style="left:87%;width:13%;height:58%;"></div>
    <div class="f-win" style="left:14%;bottom:26%;"></div>
    <div class="f-win" style="left:18%;bottom:33%;animation-delay:1s;"></div>
    <div class="f-win" style="left:33%;bottom:23%;animation-delay:0.5s;"></div>
    <div class="f-win" style="left:40%;bottom:31%;animation-delay:2s;"></div>
    <div class="f-win" style="left:50%;bottom:38%;animation-delay:1.5s;"></div>
    <div class="f-win" style="left:59%;bottom:21%;animation-delay:3s;"></div>
    <div class="f-win" style="left:72%;bottom:31%;animation-delay:2.2s;"></div>
    <div class="f-win" style="left:82%;bottom:26%;animation-delay:1.8s;"></div>
    <div class="f-win" style="left:88%;bottom:34%;animation-delay:0.3s;"></div>
  </div>
  <div class="d-eyes">
    <div class="d-eye" style="background:#1a4abf;box-shadow:0 0 14px #1a4abf;"></div>
    <div class="d-eye" style="background:#1a4abf;box-shadow:0 0 14px #1a4abf;animation-delay:0.4s;"></div>
  </div>
  <div style="text-align:center;position:relative;z-index:5;margin-top:8px;">
    <div class="menu-logo">POPPY PLAYTIME</div>
    <div class="menu-tag">COMPLETE COLLECTION &nbsp;&#xB7;&nbsp; ALL FIVE CHAPTERS</div>
    <div class="menu-co">PLAYTIME CO. &#xA9; 1950 &nbsp;&#xB7;&nbsp; "HAPPINESS IS MANDATORY"</div>
  </div>
  <div class="menu-div"></div>
  <div class="sel-lbl">&#8212; SELECT CHAPTER &#8212;</div>
  <div class="ch-grid" id="ch-grid"></div>
  <div class="menu-foot">AI-POWERED NARRATIVE &nbsp;&#xB7;&nbsp; FIVE UNIQUE HORROR STORIES</div>
  <div class="menu-warn">&#9888; SOME TOYS REMEMBER BEING HUMAN &#9888;</div>
</div>
<div id="load-overlay">
  <div class="lt" id="lt">LOADING...</div>
  <div class="lb"><div class="lf" id="lf"></div></div>
  <div class="ls" id="ls">ENTERING THE FACTORY...</div>
  <div class="le-wrap">
    <div class="le" id="le1" style="background:#cc2222;box-shadow:0 0 8px #cc2222;"></div>
    <div class="le" id="le2" style="background:#cc2222;box-shadow:0 0 8px #cc2222;animation-delay:0.5s;"></div>
  </div>
</div>
<script>
var META = [{"num": "CHAPTER 1", "subtitle": "A TIGHT SQUEEZE", "color1": "#1a4abf", "color2": "#2255dd", "villain": "HUGGY WUGGY", "rooms": "6", "year": "2021"}, {"num": "CHAPTER 2", "subtitle": "FLY IN A WEB", "color1": "#e84393", "color2": "#ff66bb", "villain": "MOMMY LONG LEGS", "rooms": "6", "year": "2022"}, {"num": "CHAPTER 3", "subtitle": "DEEP SLEEP", "color1": "#8822cc", "color2": "#aa44ff", "villain": "CATNAP", "rooms": "6", "year": "2024"}, {"num": "CHAPTER 4", "subtitle": "SAFE HAVEN", "color1": "#2a6a2a", "color2": "#44aa44", "villain": "THE DOCTOR", "rooms": "6", "year": "2025"}, {"num": "CHAPTER 5", "subtitle": "BROKEN THINGS", "color1": "#cc2222", "color2": "#ff4444", "villain": "THE PROTOTYPE", "rooms": "9", "year": "2025"}];

var grid = document.getElementById('ch-grid');
META.forEach(function(ch, i) {
  var rooms = parseInt(ch.rooms) || 6;
  var dots = '';
  for (var d = 0; d < rooms; d++) { dots += '<div class="cp-dot"></div>'; }
  var card = document.createElement('div');
  card.className = 'ch-card';
  card.style.border = '1px solid ' + ch.color1 + '28';
  card.innerHTML =
    '<div class="ch-num-blk" style="background:' + ch.color1 + '10;">' +
      '<div class="ch-n-big" style="color:' + ch.color1 + ';text-shadow:0 0 12px ' + ch.color1 + '55;">' + (i+1) + '</div>' +
      '<div class="ch-n-word" style="color:' + ch.color1 + '70;">CHAPTER</div>' +
    '</div>' +
    '<div class="ch-vdiv"></div>' +
    '<div class="ch-info">' +
      '<div class="ch-sub" style="color:' + ch.color2 + ';text-shadow:0 0 8px ' + ch.color1 + '40;">' + ch.subtitle + '</div>' +
      '<div class="ch-meta">' +
        '<span class="ch-vill">' + ch.villain + '</span>' +
        '<div class="ch-sep"></div>' +
        '<span class="ch-rm">' + ch.rooms + ' ROOMS</span>' +
        '<div class="ch-sep"></div>' +
        '<span class="ch-yr">' + ch.year + '</span>' +
      '</div>' +
      '<div class="ch-prog">' + dots + '</div>' +
    '</div>' +
    '<div class="ch-arr" style="color:' + ch.color1 + ';">&#9654;</div>';
  card.addEventListener('click', (function(idx) { return function() { loadChapter(idx); }; })(i));
  grid.appendChild(card);
});

function loadChapter(idx) {
  var ch = META[idx];
  var lo = document.getElementById('load-overlay');
  var lt = document.getElementById('lt');
  var ls = document.getElementById('ls');
  var lf = document.getElementById('lf');
  var le1 = document.getElementById('le1');
  var le2 = document.getElementById('le2');
  lt.textContent = 'CHAPTER ' + (idx+1) + ': ' + ch.subtitle;
  lt.style.color = ch.color2;
  ls.textContent = ch.villain + ' IS WAITING...';
  le1.style.background = ch.color1;
  le1.style.boxShadow = '0 0 8px ' + ch.color1;
  le2.style.background = ch.color1;
  le2.style.boxShadow = '0 0 8px ' + ch.color1;
  lf.style.background = 'linear-gradient(90deg,#200808,' + ch.color1 + ')';
  lf.style.transition = 'none';
  lf.style.width = '0%';
  lo.style.display = 'flex';
  setTimeout(function() { lf.style.transition = 'width 1s ease-out'; lf.style.width = '100%'; }, 30);
  setTimeout(function() {
    var tag = document.querySelector('script[data-index="' + idx + '"]');
    var html = atob(tag.textContent.trim());
    var backBtn = '<button id="ppback" onclick="window.location.reload()" style="position:fixed;top:10px;left:10px;z-index:99999;font-family:Creepster,cursive;font-size:12px;letter-spacing:3px;padding:7px 14px;background:rgba(2,3,8,0.95);border:1px solid #2a1010;color:#4a1818;cursor:pointer;border-radius:2px;">&#8592; MENU</button>';
    html = html.replace(/<body([^>]*)>/, '<body$1>' + backBtn);
    document.open('text/html');
    document.write(html);
    document.close();
  }, 1100);
}
</script>
</body>
</html>
