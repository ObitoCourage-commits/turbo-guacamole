<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Abandoned Mansion – Escape the Monster</title>
  <style>
    body {
      padding-top: 44px;
      font-family: "Courier New", Courier, monospace;
      background: #0a0a0a;
      color: #d22;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      color: #933;
      text-shadow: 0 0 10px #933;
      margin-bottom: 10px;
    }
    #game-container { position: relative; margin: 20px auto; }
    #grid {
      display: grid;
      grid-template-columns: repeat(15, 28px);
      grid-template-rows: repeat(10, 28px);
      gap: 1px;
      background: #111;
      border: 3px solid #400;
      box-shadow: 0 0 30px #200 inset;
    }
    .cell { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; background: #000; color: #555; }
    .wall  { background: #222; color: #444; }
    .player { color: #ffeb3b; text-shadow: 0 0 8px #ff0; }
    .monster { color: #f44; text-shadow: 0 0 10px #f00; animation: pulse 1.6s infinite; }
    .key    { color: #4caf50; }
    .exit   { color: #2196f3; }
    .vision { background: #330000; opacity: 0.5; }
    @keyframes pulse { 0%,100% { transform: scale(1.0); } 50% { transform: scale(1.12); } }
    #message { margin: 20px 0; padding: 12px 20px; background: #110; border: 1px solid #400; min-height: 3.2em; max-width: 600px; line-height: 1.45; font-size: 1.05rem; }
    #controls { margin: 16px 0; font-size: 1.1rem; }
    button { font-family: inherit; font-size: 1.1rem; padding: 10px 18px; margin: 0 8px; background: #222; color: #ccc; border: 1px solid #555; cursor: pointer; border-radius: 4px; transition: all 0.15s; }
    button:hover { background: #333; color: #fff; border-color: #777; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #status { font-size: 1.1rem; margin-top: 8px; min-height: 1.4em; }
  </style>
</head>
<body>
<div id="nxs-back-bar" style="position:fixed;top:0;left:0;right:0;height:44px;background:rgba(3,4,10,0.97);border-bottom:2px solid #f0a500;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:99999;font-family:'Share Tech Mono',monospace;backdrop-filter:blur(12px);box-shadow:0 2px 20px rgba(240,165,0,0.15);"><a href="index.html" style="font-size:11px;letter-spacing:3px;color:#f0a500;text-decoration:none;text-transform:uppercase;display:flex;align-items:center;gap:8px;transition:color 0.2s;" onmouseover="this.style.color='#ffc845'" onmouseout="this.style.color='#f0a500'">◀ NEXUS ARCADE</a><span style="font-size:9px;letter-spacing:4px;color:#4a5270;text-transform:uppercase;">ABANDONED MANSION</span></div>
<h1>Abandoned Mansion</h1>
<div id="game-container">
  <div id="grid"></div>
</div>
<div id="message">You wake up in a dark, abandoned mansion...</div>
<div id="controls">
  <button data-dir="w">↑ W</button>
  <button data-dir="a">← A</button>
  <button data-dir="s">↓ S</button>
  <button data-dir="d">→ D</button>
  <button id="btn-restart">Restart</button>
</div>
<div id="status"></div>
<script>
const WIDTH=15,HEIGHT=10;
const storyMessages=["You wake up in a dark, abandoned mansion. Echoes of whispers fill the air. Find the key and escape.","The floor creaks under your feet. Something is lurking nearby...","You hear distant footsteps. The monster is hunting.","Shadows dance on the walls. Stay out of sight!"];
let game={map:[],px:0,py:0,mx:0,my:0,mdir:"E",kx:0,ky:0,ex:0,ey:0,hasKey:false,storyIndex:0,gameOver:false,won:false};
const grid=document.getElementById("grid");
const msgEl=document.getElementById("message");
const statEl=document.getElementById("status");
for(let y=0;y<HEIGHT;y++){for(let x=0;x<WIDTH;x++){const cell=document.createElement("div");cell.classList.add("cell");cell.dataset.x=x;cell.dataset.y=y;grid.appendChild(cell);}}
const cells=document.querySelectorAll(".cell");
function idx(x,y){return y*WIDTH+x;}
function getCell(x,y){if(x<0||x>=WIDTH||y<0||y>=HEIGHT)return null;return cells[idx(x,y)];}
function isWall(x,y){if(x<0||x>=WIDTH||y<0||y>=HEIGHT)return true;return game.map[y][x]==="#";}
function generateMap(){const m=Array(HEIGHT).fill().map(()=>Array(WIDTH).fill("#"));for(let y=1;y<HEIGHT-1;y++){for(let x=1;x<WIDTH-1;x++){m[y][x]=".";}}for(let y=3;y<6;y++)m[y][5]="#";for(let x=6;x<10;x++)m[4][x]="#";for(let y=6;y<9;y++)m[y][10]="#";game.map=m;}
function randomOpenPos(exclude=[]){while(true){const x=Math.floor(Math.random()*(WIDTH-2))+1;const y=Math.floor(Math.random()*(HEIGHT-2))+1;if(game.map[y][x]!=="."||exclude.some(([ex,ey])=>ex===x&&ey===y))continue;return[x,y];}}
function placeEntities(){[game.px,game.py]=randomOpenPos();[game.mx,game.my]=randomOpenPos([[game.px,game.py]]);game.mdir="NESW"[Math.floor(Math.random()*4)];[game.kx,game.ky]=randomOpenPos([[game.px,game.py],[game.mx,game.my]]);[game.ex,game.ey]=randomOpenPos([[game.px,game.py],[game.mx,game.my],[game.kx,game.ky]]);}
function getVisionCone(){const cone=new Set();const angle=60;const dist=5;const dirs={N:{dx:0,dy:-1,base:Math.PI/2},S:{dx:0,dy:1,base:Math.PI*1.5},E:{dx:1,dy:0,base:0},W:{dx:-1,dy:0,base:Math.PI}};const{base}=dirs[game.mdir];for(let d=1;d<=dist;d++){let blocked=false;for(let a=-angle/2;a<=angle/2;a+=8){const rad=base+a*Math.PI/180;const tx=Math.round(game.mx+d*Math.cos(rad));const ty=Math.round(game.my-d*Math.sin(rad));if(tx<0||tx>=WIDTH||ty<0||ty>=HEIGHT)continue;if(isWall(tx,ty)){blocked=true;continue;}if(blocked)continue;cone.add(`${tx},${ty}`);}if(blocked)break;}return cone;}
function render(){const vision=getVisionCone();cells.forEach(cell=>{const x=+cell.dataset.x;const y=+cell.dataset.y;cell.className="cell";cell.textContent="";if(game.map[y][x]==="#"){cell.classList.add("wall");cell.textContent="█";return;}if(x===game.px&&y===game.py){cell.classList.add("player");cell.textContent="@";return;}if(x===game.mx&&y===game.my){cell.classList.add("monster");cell.textContent="M";return;}if(!game.hasKey&&x===game.kx&&y===game.ky){cell.classList.add("key");cell.textContent="K";return;}if(x===game.ex&&y===game.ey){cell.classList.add("exit");cell.textContent="E";return;}if(vision.has(`${x},${y}`)){cell.classList.add("vision");}});let text=storyMessages[game.storyIndex%storyMessages.length];game.storyIndex++;if(game.hasKey){text+="\nYou have the key! → Find the exit (E)";}else{text+="\nFind the key (K) to unlock the door.";}msgEl.textContent=text;if(game.won){statEl.innerHTML="<span style='color:#4caf50'>You escaped the mansion! YOU WIN!</span>";}else if(game.gameOver){statEl.innerHTML="<span style='color:#f44'>The monster caught you... GAME OVER</span>";}else{statEl.textContent="";}}
function movePlayer(dx,dy){if(game.gameOver||game.won)return;const nx=game.px+dx;const ny=game.py+dy;if(nx<0||nx>=WIDTH||ny<0||ny>=HEIGHT)return;if(isWall(nx,ny))return;game.px=nx;game.py=ny;if(nx===game.kx&&ny===game.ky&&!game.hasKey){game.hasKey=true;msgEl.textContent="You found the key!";}monsterTurn();checkGameState();render();}
function monsterTurn(){const vision=getVisionCone();const seesPlayer=vision.has(`${game.px},${game.py}`);if(seesPlayer){msgEl.textContent="The monster sees you! It's coming...";const dx=Math.sign(game.px-game.mx);const dyCorrect=Math.sign(game.py-game.my);const nx=game.mx+dx;const ny=game.my+dyCorrect;if(!isWall(nx,ny)){game.mx=nx;game.my=ny;}}else{const dirs=[{dir:"N",dx:0,dy:-1},{dir:"S",dx:0,dy:1},{dir:"E",dx:1,dy:0},{dir:"W",dx:-1,dy:0}];const choice=dirs[Math.floor(Math.random()*dirs.length)];game.mdir=choice.dir;const nx=game.mx+choice.dx;const ny=game.my+choice.dy;if(!isWall(nx,ny)){game.mx=nx;game.my=ny;}}}
function checkGameState(){if(game.px===game.mx&&game.py===game.my){game.gameOver=true;}if(game.px===game.ex&&game.py===game.ey){if(game.hasKey){game.won=true;}else{msgEl.textContent="The door is locked. You need the key.";}}}
document.querySelectorAll("#controls button[data-dir]").forEach(btn=>{btn.addEventListener("click",()=>{const dir=btn.dataset.dir;const map={w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]};const[dx,dy]=map[dir]||[0,0];movePlayer(dx,dy);});});
window.addEventListener("keydown",e=>{if(e.ctrlKey||e.metaKey)return;const map={ArrowUp:[0,-1],w:[0,-1],ArrowDown:[0,1],s:[0,1],ArrowLeft:[-1,0],a:[-1,0],ArrowRight:[1,0],d:[1,0]};const delta=map[e.key.toLowerCase()];if(delta){e.preventDefault();movePlayer(...delta);}});
document.getElementById("btn-restart").onclick=init;
function init(){generateMap();placeEntities();game.hasKey=false;game.storyIndex=0;game.gameOver=false;game.won=false;render();}
init();
</script>
</body>
</html>
